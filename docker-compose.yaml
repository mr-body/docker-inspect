services:

  docker-inspect-api:
    container_name: docker-inspect-api-beta
    image: mrbody/docker-inspect-api:beta.0.1
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ADMIN_USER: "admin"
      ADMIN_PASSWORD: "admin" 
    networks:
      - docker-inspect
      
  docker-inspect-ui:
    container_name: docker-inspect-ui-beta
    image:  mrbody/docker-inspect-ui:beta.0.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - docker-inspect-api
    environment:
      SERVER: "http://localhost:8000"
      WS_SERVER: "ws://localhost:8000"
    networks:
      - docker-inspect

networks:
  docker-inspect:
    driver: bridge